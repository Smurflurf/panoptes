# ===================================================================
# PANOPTES CONFIGURATION
# ===================================================================

# --- 1. Server & Upload Settings ---
server.port=9090

# Tells Spring to trust the 'X-Forwarded-For' header (crucial when running behind Nginx/Caddy)
server.forward-headers-strategy=framework

# Allow large file uploads for audio recordings and PDF documents
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB


# --- 2. Google Gemini LLM Configuration ---
# Panoptes supports an array of models for automated fallback and retries.
# Get your free API keys from Google AI Studio: https://aistudio.google.com/app/apikey
panoptes.llm.models=gemini-3.5-flash,gemini-3-flash-preview,gemini-3.1-flash-lite,gemini-2.5-flash,gemini-2.5-flash-lite

# You can provide multiple keys separated by commas. 
# Panoptes will automatically rotate through them to avoid rate limits and quotas.
panoptes.llm.api-keys=AIzaSy_DUMMY_KEY_1,AIzaSy_DUMMY_KEY_2,AIzaSy_DUMMY_KEY_3


# --- 3. OpenAlex API Configuration ---
# OpenAlex provides the hard empirical metadata (citations, peer-review status).
# Register/Info: https://openalex.org/
#
# Providing a registered email puts you in the "Polite Pool" (faster response times).
openalex.email=your.email@example.com
#
# Premium API keys (optional) drastically increase rate limits for heavy parallel processing.
openalex.api-keys=DUMMY_OPENALEX_KEY_1,DUMMY_OPENALEX_KEY_2


# --- 4. Timeouts & Asynchronous Processing ---
# Research pipelines can take several minutes to complete. 
# These settings prevent Tomcat and Spring from prematurely closing the connection.
# 3600000 ms = 1 Hour
spring.mvc.async.request-timeout=3600000
server.tomcat.connection-timeout=3600000


# --- 5. Logging Configuration ---
# Setting this to DEBUG is required for Panoptes to log individual agent LLM requests.
logging.level.panoptes.llm=DEBUG