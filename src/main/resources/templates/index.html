<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panoptes | Research Agent</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Load CSS -->
    <link rel="stylesheet" href="/css/themes/base.css">
    <link rel="stylesheet" href="/css/themes/dark.css">
    <link rel="stylesheet" href="/css/themes/light.css">
    <link rel="stylesheet" href="/css/themes/midnight.css">
    <link rel="stylesheet" href="/css/style.css">

    <!-- Apply theme before rendering to prevent FOUC (Flash of Unstyled Content) -->
    <script>
        (function() {
            let theme = localStorage.getItem('ideenatlas-theme') || 'dark';
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
</head>
<body>

    <!-- UNCONSTRAINED CANVAS VISUALIZER -->
    <canvas id="fullscreen-visualizer"></canvas>

    <main class="app-container">
        <header class="app-header">
            <h1 class="brand-title"><i class="fa-solid fa-eye"></i> Panoptes</h1>
            <p class="brand-subtitle">Autonomous Research Pipeline</p>
        </header>

        <!-- INPUT PHASE -->
        <section id="input-phase" class="phase-container is-active">
            <div class="prompt-box">
                <textarea id="research-query" placeholder="Define your research question or topic..."></textarea>

                <!-- Attached Files Area -->
                <div id="attachments-area" class="attachments-area"></div>

                <!-- Lower Control Bar -->
                <div class="prompt-controls">
                    <div class="control-left">
                        <button type="button" id="btn-record" class="icon-btn" title="Record Audio">
                            <i class="fa-solid fa-microphone"></i>
                        </button>

                        <!-- Language Input Pill -->
                        <div class="language-row">
                            <i class="fa-solid fa-globe"></i> 
                            <input type="text" id="language-input" placeholder="Language..." class="lang-input" />
                        </div>
                    </div>

                    <div class="control-right">
                        <button type="button" id="btn-go" class="go-btn" disabled>
                            Initialize <i class="fa-solid fa-arrow-right"></i>
                        </button>
                    </div>
                </div>
            </div>
        </section>

        <!-- PROCESSING PHASE (Hidden until initialized) -->
        <section id="processing-phase" class="phase-container">
            <div class="processing-card">
                <div class="status-header">
                    <i class="fa-solid fa-circle-notch fa-spin status-spinner"></i>
                    <h2 id="live-status-title">Agent deployed...</h2>
                </div>
                <div class="status-console" id="sse-console">
                    <div class="log-line">System initialized. Awaiting pipeline connection...</div>
                </div>
            </div>
        </section>
    </main>

    <script src="/js/app.js"></script>
</body>
</html>
